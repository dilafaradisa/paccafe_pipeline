services:
  source_db:
    image: postgres:16
    container_name: source_db
    restart: always
    environment:
      - POSTGRES_DB=${SRC_POSTGRES_DB}
      - POSTGRES_USER=${SRC_POSTGRES_USER}
      - POSTGRES_PASSWORD=${SRC_POSTGRES_PASSWORD}
    ports:
      - ${SRC_POSTGRES_PORT}:5432
    volumes:
      - ./database/source_data:/docker-entrypoint-initdb.d
      - source-volume:/var/lib/postgresql/data
    networks:
      - mentoring-networks

  staging_db:
    image: postgres:16
    container_name: staging_db
    restart: always
    environment:
      - POSTGRES_DB=${STG_POSTGRES_DB}
      - POSTGRES_USER=${STG_POSTGRES_USER}
      - POSTGRES_PASSWORD=${STG_POSTGRES_PASSWORD}
    ports:
      - ${STG_POSTGRES_PORT}:5432
    volumes:
      - ./database/staging_data:/docker-entrypoint-initdb.d
      - staging-volume:/var/lib/postgresql/data
    networks:
      - mentoring-networks

  warehouse_db:
    image: postgres:16
    container_name: warehouse_db
    restart: always
    environment:
      - POSTGRES_DB=${DWH_POSTGRES_DB}
      - POSTGRES_USER=${DWH_POSTGRES_USER}
      - POSTGRES_PASSWORD=${DWH_POSTGRES_PASSWORD}
    ports:
      - ${DWH_POSTGRES_PORT}:5432
    volumes:
      - ./database/warehouse_data:/docker-entrypoint-initdb.d
      - warehouse-volume:/var/lib/postgresql/data
    networks:
      - mentoring-networks

  log_db:
    image: postgres:16
    container_name: log_db
    restart: always
    environment:
      - POSTGRES_DB=${LOG_POSTGRES_DB}
      - POSTGRES_USER=${LOG_POSTGRES_USER}
      - POSTGRES_PASSWORD=${LOG_POSTGRES_PASSWORD}
    ports:
      - ${LOG_POSTGRES_PORT}:5432
    volumes:
      - ./database/log_data:/docker-entrypoint-initdb.d
      - log-volume:/var/lib/postgresql/data
    networks:
      - mentoring-networks

  minio:
    image: quay.io/minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: minio
    hostname: minio
    restart: always
    networks:
      - mentoring-networks
    volumes:
      - minio-volume:/data
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  source-volume:
  staging-volume:
  warehouse-volume:
  log-volume:
  minio-volume:

networks:
  mentoring-networks: